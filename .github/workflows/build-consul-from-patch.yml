name: build-consul

on:
  workflow_dispatch:
    inputs:
      tag:
        default: "v1.21.3"
        description: "Git tag to checkout (e.g. v1.21.3)"
        required: true

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
    env:
      PKG_NAME: consul

    steps:
      - name: Checkout this repo (with patches)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          path: patches_repo

      - name: Checkout Consul at tag
        uses: actions/checkout@v4
        with:
          repository: hashicorp/consul
          ref: ${{ inputs.tag }}
          fetch-depth: 0
          path: consul

      - name: Determine Go version
        id: get-go
        working-directory: consul
        run: |
          if [ -f .go-version ]; then
            GO_VER=$(cat .go-version)
          else
            GO_VER=1.21.6
          fi
          echo "go-version=$GO_VER" >> "$GITHUB_OUTPUT"

      - name: Setup Go
        uses: actions/setup-go@v4
        with:
          go-version: ${{ steps.get-go.outputs.go-version }}

      - name: Cache Go modules and build cache
        uses: actions/cache@v3
        with:
          path: |
            ~/.cache/go-build
            ${{ env.GO_CACHE_DIR }}
            $(go env GOPATH)/pkg/mod
          key: ${{ runner.os }}-go-${{ steps.get-go.outputs.go-version }}-mod-${{ hashFiles('consul/**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-${{ steps.get-go.outputs.go-version }}-mod-

      - name: List directory structure
        run: |
          echo "Workspace: $(pwd)"
          ls -la
          echo "== patches_repo/patches/"
          ls -la patches_repo/patches || true
          echo "== consul/"
          ls -la consul | head -n 50

      # - name: Apply patches
      #   working-directory: consul
      #   run: |
      #     for p in ../patches_repo/patches/*.patch; do
      #       echo "Applying $p…"
      #       git apply -p1 --ignore-space-change --ignore-whitespace "$p"
      #     done
      #     rm -rf ../patches_repo/patches/

      - name: Prepare Go modules
        working-directory: consul
        run: go mod download

      - name: Setup Node.js 18 and Yarn
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "yarn"
          cache-dependency-path: "consul/ui/yarn.lock"

      - name: Build UI
        working-directory: consul
        run: |
          set -eux
          CONSUL_VERSION=${{ inputs.tag }}
          if [ -x build-support/scripts/build-date.sh ]; then
            CONSUL_DATE=$(./build-support/scripts/build-date.sh)
          else
            CONSUL_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          fi
          GIT_COMMIT=$(git rev-parse --short=8 HEAD)
          echo "Building UI for version $CONSUL_VERSION commit $GIT_COMMIT date $CONSUL_DATE"
          cd ui
          yarn install --frozen-lockfile
          make
          cd ..
          rm -rf agent/uiserver/dist
          mv ui/packages/consul-ui/dist agent/uiserver/

      - name: Build Consul binary
        working-directory: consul
        run: |
          set -eux
          export CGO_ENABLED=0
          CONSUL_VERSION=${{ inputs.tag }}
          if [ -x build-support/scripts/build-date.sh ]; then
            CONSUL_DATE=$(./build-support/scripts/build-date.sh)
          else
            CONSUL_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          fi
          GIT_COMMIT=$(git rev-parse --short=8 HEAD)
          LDFLAGS="-X github.com/hashicorp/consul/version.GitCommit=${GIT_COMMIT} \
          -X github.com/hashicorp/consul/version.GitDescribe=${CONSUL_VERSION} \
          -X github.com/hashicorp/consul/version.BuildDate=${CONSUL_DATE}"
          OUT_NAME=consul_${CONSUL_VERSION}_${{ matrix.goos }}_${{ matrix.goarch }}
          mkdir -p bin
          GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} go build -ldflags="$LDFLAGS" -trimpath -buildvcs=false -o bin/$OUT_NAME ./main.go
          ./bin/$OUT_NAME version

      # Упаковываем zip: имя свободное (мы зададим его в zip_name), внутри — файл 'consul'
      - name: Package binary as zip (for actions-docker-build)
        working-directory: consul
        run: |
          set -eux
          CONSUL_VERSION=${{ inputs.tag }}
          VER_NO_V="${CONSUL_VERSION#v}"
          echo "VER_NO_V=$VER_NO_V" >> "$GITHUB_ENV"

          cp "bin/consul_${CONSUL_VERSION}_linux_amd64" bin/consul
          chmod +x bin/consul

          mkdir -p dist/linux/amd64
          zip -9j "dist/linux/amd64/consul_${VER_NO_V}_linux_amd64.zip" bin/consul

      - name: Upload zip artifact (will be fetched by the action)
        uses: actions/upload-artifact@v4
        with:
          name: consul_${{ env.VER_NO_V }}_linux_amd64.zip
          path: consul/dist/linux/amd64/consul_${{ env.VER_NO_V }}_linux_amd64.zip

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker Build (HashiCorp action)
        uses: hashicorp/actions-docker-build@v2
        with:
          version: ${{ env.VER_NO_V }}                 # 1.21.3 (без 'v')
          target: default
          arch: amd64
          # ВАЖНО: явно передаём имя артефакта и имя бинарника
          zip_name: consul_${{ env.VER_NO_V }}_linux_amd64.zip
          bin_name: consul
          # теги — направь в свой реестр
          tags: ghcr.io/${{ github.repository }}:${{ env.VER_NO_V }}
          smoke_test: .github/scripts/verify_docker.sh v${{ env.VER_NO_V }}
          workdir: consul
