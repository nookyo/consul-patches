name: Build Consul from Source with Patches

on:
  workflow_dispatch:
    inputs:
      consul_version:
        description: 'Tag or branch of Consul to build'
        required: false
        default: 'v1.21.3'
      go_version:
        description: 'Go version'
        required: false
        default: '1.21'
  push:
    branches: ['main']

env:
  CONSUL_VERSION: ${{ github.event.inputs.consul_version || 'v1.21.3' }}
  GO_VERSION: ${{ github.event.inputs.go_version || '1.21' }}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout patch repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: 'true'

      - name: Cache Go modules and build cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ env.GO_VERSION }}-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-${{ env.GO_VERSION }}-

      - name: Clone Consul source code
        run: |
          git clone --depth 1 --branch "${CONSUL_VERSION}" https://github.com/hashicorp/consul.git consul-src

      - name: Собрать Consul
        run: |
          cd consul-src
          make dev

      - name: Check Consul version
        run: |
          ./consul version

      - name: Load bynary 
        uses: actions/upload-artifact@v4
        with:
          name: consul-binary-${{ env.CONSUL_VERSION }}
          path: consul-src/bin/consul
