name: Build Consul (linux/amd64) from patches

on:
  workflow_dispatch:
    inputs:
      consul_ref:
        description: "Git ref (tag/branch/commit) в hashicorp/consul"
        required: true
        default: "v1.21.3"
      patch_dir:
        description: "Folder with patches (относительно корня репозитория)"
        required: true
        default: "patches"
      build_tags:
        description: "Go build tags (optional, e.g. 'dev')"
        required: false
        default: ""

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout this repo (for patch files)
        uses: actions/checkout@v4

      - name: Clone Consul sources
        run: |
          set -euxo pipefail
          git clone --depth 1 --branch "${{ inputs.consul_ref }}" \
            https://github.com/hashicorp/consul.git
          cd consul
          echo "CONSUL_COMMIT=$(git rev-parse --short=12 HEAD)" >> $GITHUB_ENV
          echo "Cloned consul@$(git rev-parse --short=12 HEAD)"

      # 3. Go-toolchain from go.mod
      - name: Setup Go (version from consul/go.mod)
        uses: actions/setup-go@v5
        with:
          go-version-file: consul/go.mod
          cache: true

      # 4. Check patches directory
      - name: Validate patches directory
        run: |
          set -euxo pipefail
          if [ ! -d "${{ inputs.patch_dir }}" ]; then
            echo "Directory '${{ inputs.patch_dir }}' not found"; exit 1
          fi
          files=$(ls -1 "${{ inputs.patch_dir }}"/*.patch "${{ inputs.patch_dir }}"/*.diff 2>/dev/null || true)
          if [ -z "$files" ]; then
            echo "No .patch or .diff files in '${{ inputs.patch_dir }}'"; exit 1
          fi

      # 5. Dry-run for patches (if any patch does not apply, the build will fail)
      - name: Dry-run patches
        run: |
          set -euxo pipefail
          cd consul
          for p in $(ls -1 "../${{ inputs.patch_dir }}"/*.patch "../${{ inputs.patch_dir }}"/*.diff | sort); do
            echo "Checking $p"
            git apply --check "$p"
          done

