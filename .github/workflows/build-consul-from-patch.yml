name: Build Consul with Local Patches

on:
  workflow_dispatch:
    inputs:
      consul_version:
        description: 'Git tag/branch of Consul to build'
        required: false
        default: 'v1.21.3'
      go_version:
        description: 'Go version'
        required: false
        default: '1.21'
  push:
    branches: ['main']

env:
  CONSUL_VERSION: ${{ github.event.inputs.consul_version || 'v1.21.3' }}
  GO_VERSION:      ${{ github.event.inputs.go_version     || '1.21'  }}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    # ─────────────────────────────  SOURCES  ─────────────────────────────
    - name: Checkout current repo (contains patches/)
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: ${{ env.GO_VERSION }}
        cache: true

    - name: Cache Go modules & build cache
      uses: actions/cache@v4
      with:
        path: |
          ~/.cache/go-build
          ~/go/pkg/mod
        key: ${{ runner.os }}-go-${{ env.GO_VERSION }}-${{ hashFiles('**/go.sum') }}
        restore-keys: |
          ${{ runner.os }}-go-${{ env.GO_VERSION }}-

    - name: Clone Consul sources
      run: |
        git clone --depth 1 --branch "${CONSUL_VERSION}" https://github.com/hashicorp/consul.git consul-src

    # ─────────────────────────────  PATCHES  ─────────────────────────────
    # - name: Apply local patches (if any)
    #   run: |
    #     set -e
    #     if [ -d patches ]; then
    #       shopt -s nullglob
    #       PATCHES=(patches/*.patch)
    #       if [ ${#PATCHES[@]} -eq 0 ]; then
    #         echo "No patches found in patches/ ― skipping."
    #       else
    #         echo "Found ${#PATCHES[@]} patch(es). Applying…"
    #         for p in "${PATCHES[@]}"; do
    #           echo " → $p"
    #           if ! git -C consul-src apply --whitespace=fix "../$p"; then
    #             echo "git apply failed, falling back to patch -p1"
    #             (cd consul-src && patch -p1 < "../$p")
    #           fi
    #         done
    #         # Запомним diff для артефакта
    #         (cd consul-src && git --no-pager diff) > applied-patches.diff
    #       fi
    #     else
    #       echo "Directory patches/ not found ― skipping patch step."
    #     fi

    # ───────────────────────────  VERSION TAG  ───────────────────────────
    - name: Compute patched version suffix
      id: ver
      run: |
        BASE="${CONSUL_VERSION}"
        if [ -f applied-patches.diff ] && [ -s applied-patches.diff ]; then
          HASH=$(sha1sum applied-patches.diff | cut -c1-8)
          echo "version=${BASE}-patched.${HASH}" >> "$GITHUB_OUTPUT"
        else
          echo "version=${BASE}" >> "$GITHUB_OUTPUT"
        fi

    # ─────────────────────────────  BUILD  ───────────────────────────────
    - name: Build Consul
      run: |
        cd consul-src
        # Встроим метаданные версии/коммита/даты
        LD_FLAGS="-X github.com/hashicorp/consul/version.BuildDate=$(date -u +%Y-%m-%d) \
                  -X github.com/hashicorp/consul/version.GitDescribe=${{ steps.ver.outputs.version }} \
                  -X github.com/hashicorp/consul/version.GitCommit=${GITHUB_SHA::8}"
        make dev GOFLAGS="-ldflags=\"$LD_FLAGS\""

    # ───────────────────────────  SELF-TEST  ────────────────────────────
    - name: Verify built binary
      run: |
        # Try canonical path first
        if [ -x consul-src/bin/consul ]; then
          echo "Found consul in consul-src/bin/consul"
          consul-src/bin/consul version
        # Fallback to $GOPATH/bin (rare)
        elif [ -x "$(go env GOPATH)/bin/consul" ]; then
          echo "Found consul in \$GOPATH/bin"
          "$(go env GOPATH)/bin/consul" version
        else
          echo "::error::Consul binary not found!"
          ls -al consul-src/bin || true
          exit 1
        fi

    # ──────────────────────────  ARTIFACTS  ─────────────────────────────
    - name: Upload consul binary
      uses: actions/upload-artifact@v4
      with:
        name: consul-${{ steps.ver.outputs.version }}
        path: consul-src/bin/consul
        if-no-files-found: error

    - name: Upload applied patch diff
      if: ${{ hashFiles('applied-patches.diff') != '' }}
      uses: actions/upload-artifact@v4
      with:
        name: applied-patches.diff
        path: applied-patches.diff
