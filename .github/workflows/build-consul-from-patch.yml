name: build-consul

on:
  workflow_dispatch:
    inputs:
      tag:
        default: "v1.21.3"
        description: "Git tag to checkout (e.g. v1.21.3)"
        required: true
      extra_tags:
        description: "additional comma-separated tags to apply to the built image (e.g. 'latest, stable, my-custom-tag')"
        required: false
        default: ""

permissions:
  contents: read
  packages: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            qemu: false

          - goos: linux
            goarch: arm64
            runs_on: ubuntu-latest
            qemu: true

    runs-on: ubuntu-latest
    env:
      PKG_NAME: consul
      OWNER: ${{ github.repository_owner }}

    steps:
      - name: Checkout this repo (with patches)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          path: patches_repo
          persist-credentials: false

      - name: Checkout Consul at tag
        uses: actions/checkout@v5
        with:
          repository: hashicorp/consul
          ref: ${{ inputs.tag }}
          fetch-depth: 0
          path: consul
          persist-credentials: false

      - name: Determine Go version
        id: get-go
        working-directory: consul
        run: |
          if [ -f .go-version ]; then
            GO_VER=$(cat .go-version)
          else
            GO_VER=1.21.6
          fi
          echo "go-version=$GO_VER" >> "$GITHUB_OUTPUT"

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ steps.get-go.outputs.go-version }}

      - name: Apply patches
        run: |
          cd consul
          for p in ../patches_repo/patches/*.patch; do
            echo "Applying $p…"
            git apply -p1 --ignore-space-change --ignore-whitespace "$p"
          done

      - name: Cache Go modules and build cache
        uses: actions/cache@v3
        with:
          path: |
            ~/.cache/go-build
            $(go env GOPATH)/pkg/mod
          key: ${{ runner.os }}-go-${{ steps.get-go.outputs.go-version }}-${{ matrix.goarch }}-${{ hashFiles('consul/**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-${{ steps.get-go.outputs.go-version }}-${{ matrix.goarch }}-

      - name: Prepare Go modules
        working-directory: consul
        run: go mod download

      - name: Setup Node.js 18 and Yarn
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "yarn"
          cache-dependency-path: "consul/ui/yarn.lock"

      - name: Build UI
        working-directory: consul
        run: |
          set -eux
          CONSUL_VERSION=${{ inputs.tag }}
          if [ -x build-support/scripts/build-date.sh ]; then
            CONSUL_DATE=$(./build-support/scripts/build-date.sh)
          else
            CONSUL_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          fi
          GIT_COMMIT=$(git rev-parse --short=8 HEAD)
          echo "Building UI for version $CONSUL_VERSION commit $GIT_COMMIT date $CONSUL_DATE"
          cd ui
          yarn install --frozen-lockfile
          make
          cd ..
          rm -rf agent/uiserver/dist
          mv ui/packages/consul-ui/dist agent/uiserver/

      - name: Build Consul binary
        working-directory: consul
        run: |
          set -eux
          export CGO_ENABLED=0
          CONSUL_VERSION=${{ inputs.tag }}
          if [ -x build-support/scripts/build-date.sh ]; then
            CONSUL_DATE=$(./build-support/scripts/build-date.sh)
          else
            CONSUL_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          fi
          GIT_COMMIT=$(git rev-parse --short=8 HEAD)
          LDFLAGS="-X github.com/hashicorp/consul/version.GitCommit=${GIT_COMMIT} \
          -X github.com/hashicorp/consul/version.GitDescribe=${CONSUL_VERSION} \
          -X github.com/hashicorp/consul/version.BuildDate=${CONSUL_DATE}"
          OUT_NAME=consul_${CONSUL_VERSION}_${{ matrix.goos }}_${{ matrix.goarch }}
          mkdir -p bin
          GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} go build -ldflags="$LDFLAGS" -trimpath -buildvcs=false -o bin/$OUT_NAME ./main.go

          if [ "${{ matrix.goarch }}" = "amd64" ]; then
            ./bin/$OUT_NAME version
          else
            echo "Skipping run of ${OUT_NAME} (cross-compiled for ${{ matrix.goarch }} on $(uname -m))"
            file bin/$OUT_NAME || true
          fi

      - name: Derive version and repo lc
        id: ver
        env:
          TAG: ${{ inputs.tag }}
          REPO: ${{ github.repository }}
        run: |
          echo "no_v=${TAG#v}" >> "$GITHUB_OUTPUT"
          echo "REPO_LC=${REPO,,}" >> "$GITHUB_ENV"

      - name: Package binary as zip
        working-directory: consul
        run: |
          set -eux
          VER_NO_V="${{ steps.ver.outputs.no_v }}"
          ARCH=${{ matrix.goarch }}
          cp "bin/consul_${{ inputs.tag }}_linux_${ARCH}" bin/consul
          chmod +x bin/consul
          mkdir -p dist/linux/${ARCH}
          zip -9j "dist/linux/${ARCH}/consul_${VER_NO_V}_linux_${ARCH}.zip" bin/consul

      - name: Upload zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: consul_${{ steps.ver.outputs.no_v }}_linux_${{ matrix.goarch }}.zip
          path: consul/dist/linux/${{ matrix.goarch }}/consul_${{ steps.ver.outputs.no_v }}_linux_${{ matrix.goarch }}.zip

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU (ARM only)
        if: ${{ matrix.qemu }}
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm,arm64

      - name: Docker Build (HashiCorp action)
        uses: hashicorp/actions-docker-build@v2
        with:
          version: ${{ steps.ver.outputs.no_v }}
          target: default
          arch: ${{ matrix.goarch }}
          zip_artifact_name: consul_${{ steps.ver.outputs.no_v }}_linux_${{ matrix.goarch }}.zip
          bin_name: consul
          tags: ghcr.io/${{ env.REPO_LC }}:${{ steps.ver.outputs.no_v }}-${{ matrix.goarch }}
          smoke_test: consul/.github/scripts/verify_docker.sh ${{ inputs.tag }}
          workdir: consul
          push_auto_dev_tags: true

      - name: Push image to GHCR
        run: |
          set -euo pipefail
          docker push ghcr.io/${{ env.REPO_LC }}:${{ steps.ver.outputs.no_v }}-${{ matrix.goarch }}

      - name: Compute extra tags
        id: extra
        env:
          EXTRA_TAGS_INPUT: ${{ inputs.extra_tags }}
          REPO_LC: ${{ env.REPO_LC }}
        run: |
          set -euo pipefail
          INPUT="${EXTRA_TAGS_INPUT}"
          if [ -z "$INPUT" ]; then
            echo "list=" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          IFS=',' read -ra TAGS <<< "$INPUT"
          OUT=""
          for t in "${TAGS[@]}"; do
            tag="$(echo "$t" | xargs)"        # trim
            [ -z "$tag" ] && continue
            safe_tag="$(echo "$tag" | tr ' /' '__')"   # лёгкая санитизация
            OUT="$OUT ghcr.io/${REPO_LC}:${safe_tag}-${{ matrix.goarch }}"
          done
          echo "list=$OUT" >> "$GITHUB_OUTPUT"

      - name: Tag & push extra image tags
        if: ${{ steps.extra.outputs.list != '' }}
        run: |
          set -euo pipefail
          SRC="ghcr.io/${{ env.REPO_LC }}:${{ steps.ver.outputs.no_v }}-${{ matrix.goarch }}"
          for DST in ${{ steps.extra.outputs.list }}; do
            echo "Tagging $SRC -> $DST"
            docker tag "$SRC" "$DST"
            docker push "$DST"
          done
  manifest:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Compute repo and version
        id: meta
        env:
          REPO: ${{ github.repository }}
          TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail
          echo "repo_lc=${REPO,,}" >> "$GITHUB_OUTPUT"
          echo "no_v=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Buildx (for imagetools)
        uses: docker/setup-buildx-action@v3

      - name: Create multi-arch manifest (primary)
        run: |
          set -eux
          REPO="ghcr.io/${{ steps.meta.outputs.repo_lc }}"
          TAG="${{ steps.meta.outputs.no_v }}"
          docker buildx imagetools create \
            -t "${REPO}:${TAG}" \
            "${REPO}:${TAG}-amd64" \
            "${REPO}:${TAG}-arm64"

      - name: Create extra multi-arch tags
        if: ${{ inputs.extra_tags != '' }}
        run: |
          set -eux
          REPO="ghcr.io/${{ steps.meta.outputs.repo_lc }}"
          SRC_TAG="${{ steps.meta.outputs.no_v }}"
          IFS=',' read -ra TAGS <<< "${{ inputs.extra_tags }}"
          for t in "${TAGS[@]}"; do
            tag="$(echo "$t" | xargs)"
            [ -z "$tag" ] && continue
            docker buildx imagetools create \
              -t "${REPO}:${tag}" \
              "${REPO}:${SRC_TAG}-amd64" \
              "${REPO}:${SRC_TAG}-arm64"
          done

      - name: Inspect manifest (optional)
        run: |
          docker buildx imagetools inspect ghcr.io/${{ steps.meta.outputs.repo_lc }}:${{ steps.meta.outputs.no_v }}
