name: build-consul

on:
  workflow_dispatch:
    inputs:
      tag:
        default: "v1.21.3"
        description: "Git tag to checkout (e.g. v1.21.3)"
        required: true

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
    env:
      PKG_NAME: consul

    steps:
      - name: Checkout this repo (with patches)
        uses: actions/checkout@v4

      - name: Checkout Consul at tag
        uses: actions/checkout@v4
        with:
          repository: hashicorp/consul
          ref: ${{ inputs.tag }}
          fetch-depth: 0

      - name: Determine Go version
        id: get-go
        run: |
          if [ -f .go-version ]; then
            GO_VER=$(cat .go-version)
          else
            GO_VER=1.21.6
          fi
          echo "go-version=$GO_VER" >> "$GITHUB_OUTPUT"

      - name: Setup Go
        uses: actions/setup-go@v4
        with:
          go-version: ${{ steps.get-go.outputs.go-version }}

      - name: Cache Go modules and build cache
        uses: actions/cache@v3
        with:
          path: |
            ~/.cache/go-build
            ${{ env.GO_CACHE_DIR }}
            $(go env GOPATH)/pkg/mod
          key: ${{ runner.os }}-go-${{ steps.get-go.outputs.go-version }}-mod-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-${{ steps.get-go.outputs.go-version }}-mod-

      - name: List directory structure
        run: |
          echo "Current directory: $(pwd)"
          echo "Contents of the current directory:"
          ls -la
          echo "Contents of the src directory:"
          ls -la src
          echo "Contents
           of the patches directory:"
          ls -la patches

      - name: Apply local .diff patches
        run: |
          set -euxo pipefail
          cd src  # тут git-репозиторий Consul

          git config user.email "actions@users.noreply.github.com"
          git config user.name "GitHub Actions"
          # на всякий случай избегаем проблем с переводами строк
          git config core.autocrlf false

          if compgen -G "../patches/*.diff" > /dev/null; then
            # 1) Проверяем, что контекст совпадает (упадём здесь, если нет)
            git apply --check ../patches/*.diff
            # 2) Применяем с авто-правкой пробелов/табов
            git apply --whitespace=fix ../patches/*.diff
            git add -A
            git commit -m "Apply local .diff patches from patches/"
          else
            echo "No .diff patches found in patches/; skipping."
          fi

      - name: Prepare Go modules
        run: |
          go mod download

      - name: Setup Node.js 18 and Yarn
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "yarn"
          cache-dependency-path: "ui/yarn.lock"

      - name: Build UI
        run: |
          set -eux
          CONSUL_VERSION=${{ inputs.tag }}
          if [ -x build-support/scripts/build-date.sh ]; then
            CONSUL_DATE=$(./build-support/scripts/build-date.sh)
          else
            CONSUL_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          fi
          GIT_COMMIT=$(git rev-parse --short=8 HEAD)
          echo "Building UI for version $CONSUL_VERSION commit $GIT_COMMIT date $CONSUL_DATE"
          cd ui
          yarn install --frozen-lockfile
          make
          cd ..
          rm -rf agent/uiserver/dist
          mv ui/packages/consul-ui/dist agent/uiserver/

      - name: Build Consul binary
        run: |
          set -eux
          export CGO_ENABLED=0
          CONSUL_VERSION=${{ inputs.tag }}
          if [ -x build-support/scripts/build-date.sh ]; then
            CONSUL_DATE=$(./build-support/scripts/build-date.sh)
          else
            CONSUL_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          fi
          GIT_COMMIT=$(git rev-parse --short=8 HEAD)
          LDFLAGS="-X github.com/hashicorp/consul/version.GitCommit=${GIT_COMMIT} \
          -X github.com/hashicorp/consul/version.GitDescribe=${CONSUL_VERSION} \
          -X github.com/hashicorp/consul/version.BuildDate=${CONSUL_DATE}"
          OUT_NAME=consul_${CONSUL_VERSION}_${{ matrix.goos }}_${{ matrix.goarch }}
          mkdir -p bin
          GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} go build -ldflags="$LDFLAGS" -trimpath -buildvcs=false -o bin/$OUT_NAME ./main.go

          # верификация
          ./bin/$OUT_NAME version

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: consul-${{ inputs.tag }}-linux-amd64
          path: bin/
